name: Promote the hb-app service
run-name: Promote the hb service from ${{ inputs.source-env }}

permissions:
  actions: read
  contents: read
  id-token: write

concurrency:
  group: promotions
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      source-env:
        description: 'Source environment'
        required: true
        default: dev
        type: choice
        options:
          - dev
          - staging


jobs:
  set-env:
    name: set-environment
    runs-on: ubuntu-latest
    outputs:
      target-env: ${{ steps.set-env.output.target-env }}
    steps:
      - name: set target env
        id: set-env
        shell: bash
        run: |
          if [[ ${{ inputs.source-env }} == 'dev' ]]; then
            target=staging
          elif [[ ${{ inputs.source-env }} == 'staging' ]]
            target=prod
          fi
          echo "target-env=$target" >> $GITHUB_OUTPUT
          echo "-------------- The target environment is $target ---------------"

  promote:
    name: Promote "${{ inputs.source-env }}" to "${{ needs.set-env.outputs.target-env }}"
    runs-on: ubuntu-latest
    needs: set-env
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: promote
        id: promote
        uses: ./.github/actions/update-image-tag
        with:
          REPOSITORY: ${{ vars.HELM-CHART-REPO }}
          REF: main
          PROMOTE: true
          SOURCE_ENV: ${{ inputs.source-env }}
          TARGET_ENV: ${{ needs.set-env.output.target-env }}
          IMAGE_TAG_KEY: ${{ vars.HELM-CHART-IMAGE-TAG-KEY }}